services:
  ollama:
    image: ollama/ollama:latest
    container_name: airport-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    container_name: airport-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling ${OLLAMA_MODEL:-llama3.2} model via Ollama API..."
        curl -X POST http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"${OLLAMA_MODEL:-llama3.2}\",\"stream\":false}"
        echo "Model pull complete."
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airport-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      # Using SQLite (file-based DB) as configured in Phase 2
      DATABASE_URL: sqlite:////app/data/sqlite/airport.db
      PDF_STORAGE_PATH: /app/data/pdfs
      FAISS_INDEX_PATH: /app/data/faiss
      LOG_PATH: /app/data/logs
    volumes:
      - sqlite_data:/app/data/sqlite
      - faiss_data:/app/data/faiss
      - pdf_data:/app/data/pdfs
      - logs_data:/app/data/logs
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: airport-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  sqlite_data:
  faiss_data:
  pdf_data:
  logs_data:
